# =============================================================================
# 实验配置
# =============================================================================

# 数据集配置
datasets:
  # 代码任务
  - humaneval_25
  
  # 数学任务
  - gsm8k_25
  - math_500_25
  
  # 推理任务
  - arc_easy_25
  - logiqa_25
  - gpqa_diamond_25
  
  # 医学任务
  - med_mcqa_25
  - pubmedqa_25
  - biomix_qa_25
  
  # NLP 任务
  - ontonotes5_25
  - truthful_qa_25

# 剪枝方法
pruning_methods:
  - shapley      # Shapley 值剪枝（主方法）
  - easyep       # EASYEP 剪枝
  - reap         # REAP 剪枝
  - gating       # Gating Score 剪枝
  - frequency    # 激活频率剪枝（基线）
  - random       # 随机剪枝（基线）

# 剪枝率（保留比例）
pruning_rates:
  - 0.80   # 保留 80%
  - 0.60   # 保留 60%

# Shapley 剪枝策略
shapley_strategies:
  - alpha_per_layer   # 每层 Alpha 覆盖（推荐）
  - alpha_global      # 全局 Alpha 覆盖
  - topk_per_layer    # 每层 Top-K
  - topk_global       # 全局 Top-K

# 默认配置
defaults:
  # 剪枝相关
  pruning_rate: 0.5
  pruning_method: shapley
  shapley_strategy: alpha_per_layer
  
  # 推理相关
  max_new_tokens: 64
  device: auto

  # 评测相关
  eval_batch_size: 128
  eval_timeout: 60000
  eval_port: 8801

# 评测数据集（evalscope 使用的名称）
eval_datasets:
  - humaneval
  - gsm8k
  - math_500
  - arc
  - gpqa_diamond
  - logi_qa
  - med_mcqa
  - pubmedqa
  - biomix_qa
  - ontonotes5
  - truthful_qa
