# =============================================================================
# Experiment Configuration
# =============================================================================

# Dataset configuration
datasets:
  # Code tasks
  - humaneval_25
  
  # Math tasks
  - gsm8k_25
  - math_500_25
  
  # Reasoning tasks
  - arc_easy_25
  - logiqa_25
  - gpqa_diamond_25
  
  # Medical tasks
  - med_mcqa_25
  - pubmedqa_25
  - biomix_qa_25
  
  # NLP tasks
  - ontonotes5_25
  - truthful_qa_25

# Pruning methods
pruning_methods:
  - shapley      # Shapley value pruning (primary method)
  - easyep       # EASYEP pruning
  - reap         # REAP pruning
  - gating       # Gating Score pruning
  - frequency    # Activation frequency pruning (baseline)
  - random       # Random pruning (baseline)

# Pruning rates (retention ratio)
pruning_rates:
  - 0.80   # Retain 80%
  - 0.60   # Retain 60%

# Shapley pruning strategies
shapley_strategies:
  - alpha_per_layer   # Per-layer Alpha coverage (recommended)
  - alpha_global      # Global Alpha coverage
  - topk_per_layer    # Per-layer Top-K
  - topk_global       # Global Top-K

# Default configuration
defaults:
  # Pruning related
  pruning_rate: 0.5
  pruning_method: shapley
  shapley_strategy: alpha_per_layer
  
  # Inference related
  max_new_tokens: 64
  device: auto

  # Evaluation related
  eval_batch_size: 128
  eval_timeout: 60000
  eval_port: 8801

# Evaluation datasets (names used by evalscope)
eval_datasets:
  - humaneval
  - gsm8k
  - math_500
  - arc
  - gpqa_diamond
  - logi_qa
  - med_mcqa
  - pubmedqa
  - biomix_qa
  - ontonotes5
  - truthful_qa
